name: Build Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        package_json_file: package.json
        run_install: false
    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: '.nvmrc'
        cache: pnpm
        cache-dependency-path: "pnpm-lock.yaml"

    - name: Install Projects' Dependencies
      run: |
        pnpm install
        
    - name: Build Projects
      run: |
        pnpm build

    - name: Lint Projects
      run: |
        pnpm lint

    - name: Test Projects
      run: |
        pnpm create-env-file
        pnpm test

    - name: Checking for unused code and dependencies
      run: |
        pnpm knip

    - name: Bundle Docker logs on failure
      if: ${{ failure() }}
      continue-on-error: true
      run: |
        pnpm dev:docker:logs

    - name: Upload Docker logs artifact on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: vavalm-docker-logs-${{ github.run_id }}-${{ github.run_attempt }}
        path: artifacts/*.zip
        if-no-files-found: ignore
