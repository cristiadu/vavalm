name: Build Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      with:
        package_json_file: package.json
        run_install: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'
        cache: pnpm
        cache-dependency-path: "pnpm-lock.yaml"

    - name: Install Projects' Dependencies
      run: |
        pnpm install
        
    - name: Build Projects
      run: |
        pnpm build

    - name: Lint Projects
      run: |
        pnpm lint

    - name: Test Projects
      run: |
        pnpm create-env-file
        pnpm test

    - name: Checking for unused code and dependencies
      run: |
        pnpm knip

    - name: Bundle Docker logs on failure
      if: ${{ failure() }}
      continue-on-error: true
      run: |
        pnpm dev:docker:logs

    - name: Upload Docker logs artifact on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: vavalm-docker-logs-${{ github.run_id }}-${{ github.run_attempt }}
        path: artifacts/*.zip
        if-no-files-found: ignore
